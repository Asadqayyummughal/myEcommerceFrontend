<header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="flex-1 container mx-auto px-4 py-1">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-2">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-600 to-blue-400 flex items-center justify-center">
                    <!-- Replace with your actual SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-6 h-6 text-white"
                        fill="currentColor">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>
                </div>
                <span class="font-semibold text-xl text-gray-900 dark:text-white">MyEcommerce</span>
            </div>
            <div class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input type="text" placeholder="Search"
                        class="w-full pl-10 pr-4 py-2 border  border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <div class="flex items-center space-x-6">
                <button>🛍️ All categories</button>
                <button>❤️</button>

                <button mat-icon-button>
                    <mat-icon>shopping_cart</mat-icon>
                </button>
                <button>👤</button>
            </div>
        </div>
    </div>
</header>
