<div class="mb-8">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">Categories</h2>
    <a routerLink="/products" class="text-sm text-blue-500 hover:text-blue-600 transition-colors">View All</a>
  </div>
  <div class="flex gap-5 overflow-x-auto pb-2">
    @for (cat of categories; track cat._id) {
    <div (click)="navigateToCategory(cat)"
      class="flex flex-col items-center gap-4 cursor-pointer group flex-shrink-0">
      <div class="hexagon w-32 h-[150px] bg-white shadow-sm flex flex-col items-center justify-center
                    group-hover:bg-indigo-50 transition-colors duration-200">
        <mat-icon class="text-gray-500 group-hover:text-indigo-500 transition-colors duration-200"
          style="font-size: 22px; width: 22px; height: 22px; line-height: 22px;">
          {{ getIcon(cat.name) }}
        </mat-icon>
        <div class="text-[10px] text-gray-500 tracking-widest font-medium">{{ cat.name | uppercase }}</div>
      </div>
    </div>
    }
  </div>
</div>
