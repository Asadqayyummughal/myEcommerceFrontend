<footer class="bg-gray-50 border-t border-gray-200 py-10 mt-8">
  <div class="max-w-5xl mx-auto px-4">
    <div class="grid grid-cols-3 gap-8 text-sm">

      <!-- Links -->
      <div>
        <h4 class="font-bold text-gray-700 mb-4 tracking-[0.15em] text-xs uppercase">Links</h4>
        <ul class="space-y-2 text-gray-500">
          <li><a href="#" class="hover:text-gray-800 transition-colors">FAQ</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Shipping</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Stripping</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Returns</a></li>
        </ul>
      </div>

      <!-- Stay Updated (center) -->
      <div class="text-center">
        <h4 class="font-bold text-gray-700 mb-4 tracking-[0.15em] text-xs uppercase">Stay Updated</h4>
        <div class="flex gap-2">
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="ENTER YOUR EMAIL"
            class="flex-1 min-w-0 border border-gray-300 rounded px-3 py-2 text-xs text-gray-600
                   placeholder-gray-400 focus:outline-none focus:border-blue-400 bg-white" />
          <button
            (click)="subscribe()"
            class="bg-blue-500 hover:bg-blue-600 text-white font-bold px-4 py-2 rounded text-xs
                   tracking-wide transition-colors whitespace-nowrap">
            SUBSCRIBE
          </button>
        </div>

        <!-- Social Icons -->
        <div class="flex justify-center gap-4 mt-5">
          <a href="#"
            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center
                   hover:border-blue-500 hover:text-blue-500 text-gray-500 transition-colors text-xs font-bold">
            f
          </a>
          <a href="#"
            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center
                   hover:border-pink-500 hover:text-pink-500 text-gray-500 transition-colors text-xs font-bold">
            ig
          </a>
          <a href="#"
            class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center
                   hover:border-sky-400 hover:text-sky-400 text-gray-500 transition-colors text-xs font-bold">
            tw
          </a>
        </div>
      </div>

      <!-- Contact (right) -->
      <div class="text-right">
        <h4 class="font-bold text-gray-700 mb-4 tracking-[0.15em] text-xs uppercase">Contact</h4>
        <ul class="space-y-2 text-gray-500">
          <li><a href="#" class="hover:text-gray-800 transition-colors">Email</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Terms</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Phone</a></li>
          <li><a href="#" class="hover:text-gray-800 transition-colors">Address</a></li>
        </ul>
      </div>

    </div>
  </div>
</footer>
