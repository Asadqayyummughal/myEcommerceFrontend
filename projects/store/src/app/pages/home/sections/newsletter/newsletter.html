<!-- ── Newsletter ──────────────────────────────────────────────── -->
<section class="py-20">
  <div class="container mx-auto px-6 lg:px-12">
    <div class="rounded-[40px] p-12 lg:p-20 text-center relative overflow-hidden"
      style="background:linear-gradient(135deg,#E8420A 0%,#FF6B3D 100%)">

      <!-- Blurred orbs -->
      <div class="absolute -top-20 -left-20 w-80 h-80 rounded-full pointer-events-none"
        style="background:rgba(255,255,255,0.1);filter:blur(80px)"></div>
      <div class="absolute -bottom-20 -right-20 w-80 h-80 rounded-full pointer-events-none"
        style="background:rgba(0,0,0,0.1);filter:blur(80px)"></div>

      <div class="relative z-10 flex flex-col items-center">
        <span class="text-white/80 font-black uppercase tracking-[0.2em] text-xs mb-6">Stay In The Loop</span>
        <h2 class="text-4xl lg:text-6xl font-black text-white mb-10 leading-tight max-w-2xl"
          style="font-family:'Sora',sans-serif;letter-spacing:-0.02em">
          Subscribe to get exclusive first-access.
        </h2>

        <form class="flex flex-col md:flex-row gap-4 w-full max-w-lg" (submit)="subscribe(); $event.preventDefault()">
          <input type="email" [(ngModel)]="email" name="email" placeholder="Your best email address"
            class="flex-1 bg-white rounded-2xl px-6 py-4 focus:outline-none text-gray-800 font-medium"
            style="box-shadow:0 0 0 4px transparent" onfocus="this.style.boxShadow='0 0 0 4px rgba(255,255,255,0.3)'"
            onblur="this.style.boxShadow='0 0 0 4px transparent'" />
          <button type="submit"
            class="px-10 py-4 rounded-2xl font-black text-white hover:scale-105 active:scale-95 transition-transform whitespace-nowrap"
            style="background:#1C1C1E">
            Subscribe Now
          </button>
        </form>

        <p class="text-white/60 text-[10px] mt-6 uppercase tracking-widest">
          By subscribing, you agree to our privacy policy. No spam, ever.
        </p>
      </div>
    </div>
  </div>
</section>
