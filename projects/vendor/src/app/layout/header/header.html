<header class="flex items-center justify-between px-4 lg:px-6 py-3 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm shrink-0">

  <!-- Left: toggle + title -->
  <div class="flex items-center gap-4">
    <button (click)="toggleSidebar.emit()"
      class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="flex items-center gap-2">
      <div class="w-1.5 h-5 rounded-full bg-indigo-600"></div>
      <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Vendor Dashboard</span>
    </div>
  </div>

  <!-- Right: theme + user -->
  <div class="flex items-center gap-3">
    <button (click)="themeService.toggle()"
      class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <div class="flex items-center gap-2.5 pl-3 border-l border-slate-200 dark:border-slate-700">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-md">
        <span class="text-white text-xs font-bold">{{ authService.currentUser?.name?.[0]?.toUpperCase() ?? 'V' }}</span>
      </div>
      <div class="hidden sm:block">
        <div class="text-xs font-semibold text-slate-800 dark:text-slate-200">{{ authService.currentUser?.name }}</div>
        <div class="text-[10px] text-indigo-500 font-medium capitalize">{{ authService.currentUser?.role?.name }}</div>
      </div>
      <button (click)="logout()"
        class="ml-1 p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/20 text-slate-400 hover:text-red-500 transition-colors">
        <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">logout</mat-icon>
      </button>
    </div>
  </div>
</header>
