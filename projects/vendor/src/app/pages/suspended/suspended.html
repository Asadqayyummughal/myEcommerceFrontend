<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-6">
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-xl p-10 max-w-md w-full text-center">
    <div class="w-20 h-20 rounded-2xl bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-6">
      <mat-icon class="text-red-500 dark:text-red-400" style="font-size:40px;width:40px;height:40px;line-height:40px">block</mat-icon>
    </div>
    <h1 class="text-2xl font-black text-slate-900 dark:text-white mb-2">Account Suspended</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-8">
      Your vendor account has been suspended. Please contact support for more information about your account status.
    </p>
    <div class="space-y-3">
      <a href="mailto:support@shopzone.com"
        class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-violet-600
               hover:from-indigo-500 hover:to-violet-500 text-white font-bold py-3 rounded-xl text-sm transition-all">
        <mat-icon style="font-size:16px;width:16px;height:16px;line-height:16px">mail</mat-icon>
        Contact Support
      </a>
      <button (click)="logout()"
        class="w-full border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-400
               hover:bg-slate-50 dark:hover:bg-slate-700/50 font-semibold py-3 rounded-xl text-sm transition-colors">
        Sign Out
      </button>
    </div>
  </div>
</div>
