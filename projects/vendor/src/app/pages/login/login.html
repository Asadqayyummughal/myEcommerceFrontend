<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-indigo-950 to-violet-900 relative overflow-hidden">

  <!-- Background orbs -->
  <div class="absolute top-10 left-10 w-80 h-80 rounded-full bg-indigo-600/10 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-96 h-96 rounded-full bg-violet-600/15 blur-3xl pointer-events-none"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-indigo-900/20 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-sm mx-4">

    <!-- Card -->
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-600/30">
          <mat-icon class="text-white" style="font-size:30px;width:30px;height:30px;line-height:30px">storefront</mat-icon>
        </div>
        <h1 class="text-2xl font-black text-white mb-1">Vendor Portal</h1>
        <p class="text-slate-400 text-sm">Sign in to manage your store</p>
      </div>

      <!-- Error -->
      @if (error) {
      <div class="mb-5 flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3 rounded-xl">
        <mat-icon style="font-size:16px;width:16px;height:16px;line-height:16px">error</mat-icon>
        {{ error }}
      </div>
      }

      <!-- Form -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
          <input type="email" [(ngModel)]="email" (keyup.enter)="submit()" placeholder="vendor@example.com"
            class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white text-sm
                   placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:bg-slate-700
                   transition-all caret-white" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" (keyup.enter)="submit()"
              placeholder="••••••••"
              class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 pr-11 text-white text-sm
                     placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:bg-slate-700
                     transition-all caret-white" />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
              <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <button (click)="submit()" [disabled]="loading || !email || !password"
          class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500
                 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold
                 py-3 rounded-xl text-sm transition-all flex items-center justify-center gap-2 mt-2
                 shadow-lg shadow-indigo-600/30">
          @if (loading) {
          <mat-icon class="animate-spin" style="font-size:18px;width:18px;height:18px;line-height:18px">refresh</mat-icon>
          Signing in...
          } @else {
          Sign In
          <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">arrow_forward</mat-icon>
          }
        </button>
      </div>

      <!-- Apply link -->
      <p class="text-center text-xs text-slate-500 mt-6">
        Not a vendor yet?
        <a routerLink="/apply" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors ml-1">Apply Now →</a>
      </p>
    </div>
  </div>
</div>
