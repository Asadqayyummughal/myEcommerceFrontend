<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-blue-900">

  <!-- Background blobs -->
  <div class="absolute top-20 left-20 w-72 h-72 rounded-full bg-blue-600/10 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-20 right-20 w-96 h-96 rounded-full bg-violet-600/10 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-sm mx-4">

    <!-- Card -->
    <div class="bg-white/5 backdrop-blur border border-white/10 rounded-3xl p-8 shadow-2xl">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-600/30">
          <mat-icon class="text-white text-3xl" style="font-size:28px;width:28px;height:28px;line-height:28px">admin_panel_settings</mat-icon>
        </div>
        <h1 class="text-2xl font-black text-white mb-1">Admin Portal</h1>
        <p class="text-gray-400 text-sm">Sign in to your admin account</p>
      </div>

      <!-- Error -->
      @if (error) {
      <div class="mb-4 flex items-center gap-2 bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3 rounded-xl">
        <mat-icon style="font-size:16px;width:16px;height:16px;line-height:16px">error</mat-icon>
        {{ error }}
      </div>
      }

      <!-- Form -->
      <div class="space-y-4">
        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
          <input type="email" [(ngModel)]="email" (keyup.enter)="submit()" placeholder="admin@example.com"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-500
                   focus:outline-none focus:border-blue-500 focus:bg-white/15 transition-all" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" (keyup.enter)="submit()"
              placeholder="••••••••"
              class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 pr-11 text-white text-sm placeholder-gray-500
                     focus:outline-none focus:border-blue-500 focus:bg-white/15 transition-all" />
            <button type="button" (click)="showPassword = !showPassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
              <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button (click)="submit()" [disabled]="loading || !email || !password"
          class="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold
                 py-3 rounded-xl text-sm transition-colors flex items-center justify-center gap-2 mt-2">
          @if (loading) {
          <mat-icon class="animate-spin" style="font-size:18px;width:18px;height:18px;line-height:18px">refresh</mat-icon>
          Signing in...
          } @else {
          Sign In
          <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">arrow_forward</mat-icon>
          }
        </button>
      </div>

      <!-- Footer note -->
      <p class="text-center text-xs text-gray-600 mt-6">Admin and support accounts only</p>
    </div>
  </div>
</div>
