<aside [class]="'flex flex-col bg-gray-900 text-white transition-all duration-300 shrink-0 ' + (collapsed() ? 'w-16' : 'w-60')">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-4 py-5 border-b border-white/10">
    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
      <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px" class="text-white">admin_panel_settings</mat-icon>
    </div>
    @if (!collapsed()) {
    <div>
      <div class="text-sm font-black text-white leading-tight">ShopZone</div>
      <div class="text-[10px] text-gray-400 uppercase tracking-widest">Admin Panel</div>
    </div>
    }
  </div>

  <!-- Nav -->
  <nav class="flex-1 py-4 space-y-1 px-2">
    @for (item of navItems; track item.route) {
    <a [routerLink]="item.route" routerLinkActive="bg-blue-600 text-white"
      [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-400 hover:bg-white/10 hover:text-white transition-all group">
      <mat-icon style="font-size:20px;width:20px;height:20px;line-height:20px" class="shrink-0">{{ item.icon }}</mat-icon>
      @if (!collapsed()) {
      <span class="text-sm font-medium">{{ item.label }}</span>
      }
    </a>
    }
  </nav>

  <!-- Bottom -->
  @if (!collapsed()) {
  <div class="p-4 border-t border-white/10">
    <div class="text-[10px] text-gray-600 text-center">v1.0.0 Admin</div>
  </div>
  }
</aside>
