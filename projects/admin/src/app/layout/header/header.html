<header class="flex items-center justify-between px-6 py-3 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">

  <!-- Left: toggle + breadcrumb -->
  <div class="flex items-center gap-4">
    <button (click)="toggleSidebar.emit()"
      class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">Admin Dashboard</span>
  </div>

  <!-- Right: theme + user -->
  <div class="flex items-center gap-3">
    <!-- Theme toggle -->
    <button (click)="themeService.toggle()"
      class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
      <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- User info -->
    <div class="flex items-center gap-2 pl-3 border-l border-gray-200 dark:border-gray-700">
      <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center">
        <span class="text-white text-xs font-bold">{{ authService.currentUser?.name?.[0]?.toUpperCase() ?? 'A' }}</span>
      </div>
      <div class="hidden sm:block">
        <div class="text-xs font-semibold text-gray-800 dark:text-gray-200">{{ authService.currentUser?.name }}</div>
        <div class="text-[10px] text-gray-400 capitalize">{{ authService.currentUser?.role }}</div>
      </div>
      <button (click)="logout()"
        class="ml-2 p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-900/30 text-gray-400 hover:text-red-500 transition-colors">
        <mat-icon style="font-size:18px;width:18px;height:18px;line-height:18px">logout</mat-icon>
      </button>
    </div>
  </div>
</header>
